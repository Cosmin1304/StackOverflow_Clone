spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/stackoverflow
#spring.datasource.username=${DB_USER:ADMIN}
#spring.datasource.password=${DB_PASS:ADMIN}
#spring.datasource.username=postgres
#spring.datasource.password=parolapostgres
spring.datasource.username=ADMIN
spring.datasource.password=ADMIN
spring.jpa.hibernate.ddl-auto=update
upload.dir=uploads
spring.web.resources.static-locations=file:uploads/

# Secretele (parole, token-uri) stau in secrets.properties, care e in .gitignore (NU se urca pe GitHub).
# "optional:" => aplicatia porneste si daca fisierul lipseste (ex: o clona proaspata, fara secrete).
spring.config.import=optional:file:./secrets.properties

# --- Email (Gmail SMTP) ---
# spring.mail.username si spring.mail.password sunt definite in secrets.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${spring.mail.username:no-reply@stackoverflow.local}

# --- Twilio (WhatsApp) ---
# twilio.account-sid si twilio.auth-token sunt definite in secrets.properties
# Numarul sandbox WhatsApp (format: whatsapp:+14155238886)
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
