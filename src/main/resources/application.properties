spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/stackoverflow
#spring.datasource.username=${DB_USER:ADMIN}
#spring.datasource.password=${DB_PASS:ADMIN}
#spring.datasource.username=postgres
#spring.datasource.password=parolapostgres
spring.datasource.username=ADMIN
spring.datasource.password=ADMIN
spring.jpa.hibernate.ddl-auto=update
upload.dir=uploads
spring.web.resources.static-locations=file:uploads/

# Secretele (parole, token-uri) stau in secrets.properties pentru rulari LOCALE non-Docker.
# Pentru Docker se folosesc env vars din .env (vezi stack-overflow.yaml).
spring.config.import=optional:file:./secrets.properties

# --- Microserviciul de notificari ---
# Aplicatia principala NU mai trimite direct email/WhatsApp; deleaga catre notification-service.
# In Docker, URL-ul vine din env var NOTIFICATION_SERVICE_URL=http://notification_service:8081.
# Local (non-Docker), foloseste default-ul de mai jos.
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8081}
