name: Tests

on:
  push:
    branches: [main, cosmin]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests (Maven, JUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run main app tests
        run: mvn -B test

      - name: Run notification-service tests
        working-directory: notification-service
        run: mvn -B test

  frontend-test:
    name: Frontend tests (Cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # --legacy-peer-deps necesar pentru conflictul de peer deps din Angular 21.
      - name: Cypress component tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          component: true
          install-command: npm ci --legacy-peer-deps

      - name: Cypress E2E tests (with ng serve)
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 180
