name: Tests

# Ruleaza la fiecare push si la fiecare pull request.
# Acopera: testele unitare backend (Maven + JUnit) si testele Cypress frontend (component + E2E).
on:
  push:
    branches: [main, cosmin]
  pull_request:
    branches: [main]

jobs:
  # ===== BACKEND: spring_app + notification-service =====
  backend-test:
    name: Backend tests (Maven, JUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # `mvn` e preinstalat pe runner-ul ubuntu-latest — il folosim direct.

      # Aplicatia principala (root). Spring Boot Test ruleaza toate clasele @Test din src/test.
      - name: Run main app tests
        run: mvn -B test

      # Microserviciul are propriul pom.
      - name: Run notification-service tests
        working-directory: notification-service
        run: mvn -B test

  # ===== FRONTEND: Cypress (component + E2E) =====
  frontend-test:
    name: Frontend tests (Cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Action-ul oficial Cypress: instaleaza npm-ci + cache binar Cypress.
      - name: Cypress component tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          component: true

      # Pentru E2E pornim ng serve in background si asteptam sa raspunda pe :4200.
      # Test-ul auth-guard.cy.ts mock-uieste backend-ul cu cy.intercept, deci nu avem nevoie
      # de Spring pornit in CI — doar de dev server-ul Angular.
      - name: Cypress E2E tests (with ng serve)
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false  # deja instalat in pasul anterior
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 180
