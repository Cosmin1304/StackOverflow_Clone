name: Lint & Code Quality

on:
  push:
    branches: [main, cosmin]
  pull_request:
    branches: [main]

jobs:
  backend-compile:
    name: Backend compile check (Java)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compile main app
        run: mvn -B -DskipTests compile

      - name: Compile notification-service
        working-directory: notification-service
        run: mvn -B -DskipTests compile

  frontend-typecheck:
    name: Frontend type-check (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # --legacy-peer-deps necesar pentru conflictul de peer deps din Angular 21.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript strict type-check
        run: npx tsc --noEmit -p tsconfig.app.json
