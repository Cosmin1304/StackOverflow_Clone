services:
  spring_app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
        ME_CONFIG_POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
        ME_CONFIG_POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
        DB_HOST : postgres
        DB_NAME : stackoverflow
        # IMPORTANT: hostname-ul NU poate contine underscore (Tomcat 10 respinge Host header invalid).
        # De aceea service-ul Docker se numeste cu cratima: notification-service.
        NOTIFICATION_SERVICE_URL: http://notification-service:8081
    depends_on:
      - "postgres"
      - "notification-service"

  # Microserviciu separat pentru notificari (email + WhatsApp).
  # Apelat de spring_app pe reteaua interna Docker la POST /api/notify/ban.
  notification-service:
    build: ./notification-service
    env_file:
      - .env
    ports:
      - "8081:8081"

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
      POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
      POSTGRES_DB: stackoverflow
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
#  auth:
#    image: auth
volumes:
  postgres_data: