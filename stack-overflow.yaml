services:
  spring_app:
    build: .
    ports:
      - "8080:8080"
    environment:
        ME_CONFIG_POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
        ME_CONFIG_POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
        DB_HOST : postgres
        DB_NAME : stackoverflow
    depends_on:
      - "postgres"
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
      POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
      POSTGRES_DB: stackoverflow
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
#  auth:
#    image: auth
volumes:
  postgres_data: