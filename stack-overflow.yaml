services:
  spring_app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
        ME_CONFIG_POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
        ME_CONFIG_POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
        DB_HOST : postgres
        DB_NAME : stackoverflow
        # Tomcat 10 respinge underscore in Host header — service-ul Docker foloseste cratima.
        NOTIFICATION_SERVICE_URL: http://notification-service:8081
    depends_on:
      - "postgres"
      - "notification-service"

  notification-service:
    build: ./notification-service
    env_file:
      - .env
    ports:
      - "8081:8081"

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_STACKOVERFLOW_PASS}
      POSTGRES_USER: ${POSTGRES_STACKOVERFLOW_USER}
      POSTGRES_DB: stackoverflow
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: