# Microserviciul ruleaza pe alt port ca sa nu intre in conflict cu spring_app (8080).
server.port=8081

# --- Email (Gmail SMTP) ---
# spring.mail.username/password sunt populate din env vars (SPRING_MAIL_USERNAME / SPRING_MAIL_PASSWORD)
# datorita relaxed binding-ului Spring Boot.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${spring.mail.username:no-reply@stackoverflow.local}

# --- Twilio (WhatsApp) ---
# twilio.account-sid / twilio.auth-token vin tot din env vars (TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN).
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
