<div class="register-container">
  <div class="register-card">
    <div class="logo-container">
      <span class="icon">🚀</span>
    </div>

    <h2>Creare Cont Nou</h2>

    <form class="register-form">
      <div class="form-group">
        <label for="username">Nume utilizator</label>
        <input type="text" id="username" [(ngModel)]="registerData.userName" name="userName" placeholder="ex: cosmin_dev">
      </div>

      <div class="form-group">
        <label for="email">Adresă de Email</label>
        <input type="email" id="email" [(ngModel)]="registerData.userEmail" name="userEmail" placeholder="cosmin@example.com">
      </div>

      <div class="form-group">
        <label for="password">Parolă</label>
        <input type="password" id="password" [(ngModel)]="registerData.userPassword" name="userPassword" placeholder="••••••••">
      </div>

      <button type="button" class="btn-submit" (click)="onRegister()">Înregistrează-te</button>
    </form>

    <p class="login-text">
      Ai deja un cont? <a routerLink="/login">Loghează-te aici</a>
    </p>
  </div>
</div>
