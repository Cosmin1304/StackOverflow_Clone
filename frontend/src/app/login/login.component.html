<div class="login-container">
  <div class="login-card">
    <div class="logo-container">
      <span class="icon">🚀</span>
    </div>

    <h2>Autentificare</h2>

    <form class="login-form">
      <div class="form-group">
        <label for="username">Nume utilizator sau Email</label>
        <input type="text" id="username" name="username" [(ngModel)]="credentials.username" placeholder="ex: user_name">
      </div>

      <div class="form-group">
        <label for="password">Parola</label>
        <input type="password" id="password" name="password" [(ngModel)]="credentials.password" placeholder="••••••••">
      </div>

      <button type="button" class="btn-submit" (click)="onLogin()">Log in</button>
    </form>

    <p class="register-text">
      Nu ai un cont? <a routerLink="/register">Inregistreaza-te</a>
    </p>
  </div>
</div>
