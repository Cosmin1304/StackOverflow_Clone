<header class="navbar">
  <div class="nav-container">
    <!-- Logo -->
    <div class="logo" routerLink="/">
      <span class="icon">🚀</span>
      <span class="text">Stack<strong>Overflow</strong></span>
    </div>

    <!-- Bara de Căutare (pentru cerința de filtrare) -->
    <div class="search-bar">
      <input type="text"
             placeholder="Caută întrebări..."
             [(ngModel)]="searchTerm"
             (ngModelChange)="onSearchChange()">
    </div>

    <!-- Acțiuni Utilizator -->
    <div class="user-actions">
      <button class="btn-logout" (click)="onLogout()">Log out</button>
      <button class="btn-register" routerLink="/register">Sign up</button>
      <button class="btn-ask" routerLink="/ask">Ask Question</button>
    </div>
  </div>
</header>
