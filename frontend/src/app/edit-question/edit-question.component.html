<div class="ask-container">
  <div class="ask-header">
    <h2>Editează întrebarea</h2>
  </div>

  <div class="ask-card">
    <form class="ask-form" #editForm="ngForm">

      <div class="form-group">
        <label for="title">Titlu <span style="color: red;">*</span></label>
        <input type="text" id="title" name="title" [(ngModel)]="editData.title" #titleModel="ngModel" required [class.is-invalid]="titleModel.invalid && (titleModel.dirty || titleModel.touched)">
        <div class="error-message" *ngIf="titleModel.invalid && (titleModel.dirty || titleModel.touched)"><small>Titlul este obligatoriu!</small></div>
      </div>

      <div class="form-group">
        <label for="body">Detalii (Text) <span style="color: red;">*</span></label>
        <textarea id="body" name="body" rows="8" [(ngModel)]="editData.text" #textModel="ngModel" required [class.is-invalid]="textModel.invalid && (textModel.dirty || textModel.touched)"></textarea>
        <div class="error-message" *ngIf="textModel.invalid && (textModel.dirty || textModel.touched)"><small>Detaliile întrebării sunt obligatorii!</small></div>
      </div>

      <div class="form-group">
        <label>Schimbă imaginea (Opțional)</label>
        <p class="help-text">Alege o poză nouă dacă vrei să o înlocuiești pe cea veche.</p>

        <input
          type="file"
          accept="image/*"
          (change)="onFileSelected($event)"
          [disabled]="isUploadingImage"
          style="display: block; margin-top: 5px;">

        <div *ngIf="isUploadingImage" style="color: #f48024; margin-top: 10px; font-weight: 500;">
          Se încarcă imaginea...
        </div>

        <div *ngIf="editData.pictureUrl && !isUploadingImage" style="margin-top: 10px;">
          <small style="color: #2e7d32; font-weight: bold;">Imagine atașată </small>
          <img [src]="editData.pictureUrl" alt="Preview" style="max-height: 120px; display: block; margin-top: 8px; border-radius: 4px; border: 1px solid #ccc;">
        </div>
      </div>
      <div class="form-group">
        <label for="tags">Tag-uri</label>
        <input type="text" id="tags" name="tags" [(ngModel)]="tagsString">
      </div>

      <button type="button" class="btn-submit" [disabled]="editForm.invalid || isUploadingImage" (click)="onUpdate()">
        Salvează modificările
      </button>

    </form>
  </div>
</div>
